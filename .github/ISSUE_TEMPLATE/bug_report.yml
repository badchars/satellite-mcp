name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run tool '...' with input '...'
        2. Observe error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: Which tool is affected?
      placeholder: "e.g., satellite_search, satellite_imagery, orbit_track"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      placeholder: |
        - OS: macOS / Linux / Windows
        - Node.js version: 22.x
        - satellite-mcp version: 0.1.0
        - Usage mode: MCP Server / CLI
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output / logs
      description: Paste any error messages or logs here.
      render: shell
    validations:
      required: false
