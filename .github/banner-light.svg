<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f6f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0969da"/>
      <stop offset="100%" stop-color="#0550ae"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="icon-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Orbit clip for earth -->
    <clipPath id="earth-clip">
      <circle cx="0" cy="0" r="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#0969da" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="240" cy="100" r="100" fill="#0969da" opacity="0.03"/>
  <circle cx="240" cy="100" r="55" fill="#0969da" opacity="0.04"/>
  <circle cx="600" cy="90" r="80" fill="#0550ae" opacity="0.03"/>
  <circle cx="600" cy="90" r="45" fill="#0550ae" opacity="0.04"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="800" height="2" fill="url(#accent)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="198" width="800" height="2" fill="url(#accent)"/>

  <!-- Satellite + Earth icon -->
  <g transform="translate(400, 58)" filter="url(#icon-glow)">
    <!-- Earth circle -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#0969da" stroke-width="1.8" opacity="0.7"/>
    <!-- Continent-like arcs on the earth -->
    <g clip-path="url(#earth-clip)">
      <path d="M-6,-16 Q-2,-8 -8,-2 Q-12,6 -4,12 Q0,16 6,14" fill="none" stroke="#0969da" stroke-width="1.2" opacity="0.3"/>
      <path d="M4,-14 Q10,-8 8,0 Q6,8 10,14" fill="none" stroke="#0969da" stroke-width="1.2" opacity="0.3"/>
      <!-- Latitude lines -->
      <ellipse cx="0" cy="-6" rx="18" ry="4" fill="none" stroke="#0969da" stroke-width="0.8" opacity="0.18"/>
      <ellipse cx="0" cy="6" rx="18" ry="4" fill="none" stroke="#0969da" stroke-width="0.8" opacity="0.18"/>
    </g>

    <!-- Orbit ring (elliptical, tilted) -->
    <ellipse cx="0" cy="0" rx="32" ry="10" fill="none" stroke="#0969da" stroke-width="1" opacity="0.35"
             stroke-dasharray="4 3" transform="rotate(-30)"/>

    <!-- Satellite body at orbit position -->
    <g transform="rotate(-30) translate(32, 0) rotate(30)">
      <!-- Satellite core -->
      <rect x="-3" y="-2.5" width="6" height="5" rx="1" fill="#0969da" opacity="0.85"/>
      <!-- Solar panels -->
      <rect x="-11" y="-1.5" width="7" height="3" rx="0.5" fill="none" stroke="#0969da" stroke-width="1" opacity="0.6"/>
      <rect x="4" y="-1.5" width="7" height="3" rx="0.5" fill="none" stroke="#0969da" stroke-width="1" opacity="0.6"/>
      <!-- Panel lines -->
      <line x1="-7.5" y1="-1.5" x2="-7.5" y2="1.5" stroke="#0969da" stroke-width="0.6" opacity="0.35"/>
      <line x1="7.5" y1="-1.5" x2="7.5" y2="1.5" stroke="#0969da" stroke-width="0.6" opacity="0.35"/>
      <!-- Antenna -->
      <line x1="0" y1="-2.5" x2="0" y2="-5.5" stroke="#0969da" stroke-width="0.8" opacity="0.6"/>
      <circle cx="0" cy="-6" r="1" fill="#0969da" opacity="0.6"/>
    </g>

    <!-- Signal waves from satellite downward -->
    <g opacity="0.2">
      <path d="M22,-6 Q26,4 20,10" fill="none" stroke="#0969da" stroke-width="0.8"/>
      <path d="M24,-8 Q30,4 22,14" fill="none" stroke="#0969da" stroke-width="0.6"/>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="108" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="28" font-weight="700" fill="#1f2328" letter-spacing="-0.5">satellite-mcp</text>

  <!-- Subtitle -->
  <text x="400" y="130" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#656d76" letter-spacing="0.5">Full-Spectrum GEOINT MCP Server</text>

  <!-- Accent line -->
  <rect x="330" y="141" width="140" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Category pills -->
  <g transform="translate(400, 168)">
    <!-- Imagery -->
    <g transform="translate(-170, 0)">
      <rect x="-38" y="-12" width="76" height="24" rx="12" fill="#0969da" fill-opacity="0.06" stroke="#0969da" stroke-opacity="0.2" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#0969da">Imagery</text>
    </g>
    <!-- Radar -->
    <g transform="translate(-78, 0)">
      <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#0969da" fill-opacity="0.06" stroke="#0969da" stroke-opacity="0.2" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#0969da">Radar</text>
    </g>
    <!-- GEOINT -->
    <g transform="translate(6, 0)">
      <rect x="-34" y="-12" width="68" height="24" rx="12" fill="#0969da" fill-opacity="0.06" stroke="#0969da" stroke-opacity="0.2" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#0969da">GEOINT</text>
    </g>
    <!-- MCP -->
    <g transform="translate(86, 0)">
      <rect x="-28" y="-12" width="56" height="24" rx="12" fill="#0550ae" fill-opacity="0.07" stroke="#0550ae" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#0550ae">MCP</text>
    </g>
    <!-- CLI -->
    <g transform="translate(158, 0)">
      <rect x="-24" y="-12" width="48" height="24" rx="12" fill="#0550ae" fill-opacity="0.07" stroke="#0550ae" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#0550ae">CLI</text>
    </g>
  </g>

  <!-- Decorative corner dots -->
  <circle cx="20" cy="16" r="1.5" fill="#0969da" opacity="0.25"/>
  <circle cx="780" cy="16" r="1.5" fill="#0550ae" opacity="0.25"/>
  <circle cx="20" cy="184" r="1.5" fill="#0550ae" opacity="0.25"/>
  <circle cx="780" cy="184" r="1.5" fill="#0969da" opacity="0.25"/>
</svg>